    <script>
      // Handle GitHub Pages SPA routing
      var segment = 0;
      if (new URL(location).searchParams.has("p")) {
        segment = new URL(location).searchParams.get("p");
      }
      sessionStorage.redirect = segment || "/";
      history.replaceState(null, null, location.pathname);
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
